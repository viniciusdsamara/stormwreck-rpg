<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tormenta de Stormwreck — Multiplayer</title>
<style>
  :root{
    --basalt-900:#0e0b12; --basalt-800:#15111a; --basalt-700:#1e1925; --basalt-600:#2c2536;
    --ember:#e8843c; --ember-d:#c4682e; --parch:#ece3d4; --stone-400:#9a8fa3; --stone-300:#c4bccb;
    --myco:#5a8f6b; --blood:#c4485a; --azure:#5fa8c7; --gold:#d9c48a;
    --font:#ece3d4;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; min-height:100vh; background:
      radial-gradient(1200px 600px at 50% -10%, #1c1726 0%, var(--basalt-900) 60%);
    color:var(--font); font-family:'Segoe UI',system-ui,sans-serif; padding:24px 16px;
    display:flex; align-items:flex-start; justify-content:center;
  }
  .wrap{ width:100%; max-width:620px; }
  .screen{ display:none; } .screen.active{ display:block; }
  h1{ font-size:1.5rem; margin:0 0 4px; letter-spacing:0.01em; }
  .eyebrow{ font-family:ui-monospace,monospace; font-size:0.66rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--ember); }
  .sub{ color:var(--stone-400); font-size:0.86rem; margin:2px 0 20px; }
  .panel{ background:linear-gradient(180deg,var(--basalt-700),var(--basalt-800)); border:1px solid var(--basalt-600);
          border-radius:16px; padding:22px; box-shadow:0 24px 60px -30px #000; margin-bottom:16px; }
  label.field{ display:block; margin-bottom:14px; }
  label.field > span{ display:block; font-size:0.74rem; color:var(--stone-300); margin-bottom:5px; letter-spacing:0.03em; }
  input, select{ width:100%; background:var(--basalt-900); border:1px solid var(--basalt-600); color:var(--parch);
          border-radius:9px; padding:10px 12px; font-size:0.92rem; }
  input:focus, select:focus{ outline:none; border-color:var(--ember); }
  .btn{ background:linear-gradient(180deg,var(--ember),var(--ember-d)); color:#1a1018; border:none; border-radius:10px;
        padding:11px 18px; font-weight:700; font-size:0.92rem; cursor:pointer; transition:filter .15s; }
  .btn:hover{ filter:brightness(1.08); } .btn:disabled{ opacity:0.5; cursor:not-allowed; filter:none; }
  .btn.ghost{ background:var(--basalt-700); color:var(--parch); border:1px solid var(--basalt-600); }
  .btn.block{ width:100%; }
  .row{ display:flex; gap:10px; align-items:center; }
  .row.between{ justify-content:space-between; }
  .err{ color:var(--blood); font-size:0.82rem; min-height:1.1em; margin-top:4px; }
  .topline{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
  .topline small{ color:var(--stone-400); font-size:0.78rem; }
  .or{ text-align:center; color:var(--stone-400); font-size:0.72rem; letter-spacing:0.2em; margin:6px 0 14px; }
  .code-box{ display:flex; align-items:center; gap:12px; background:var(--basalt-900); border:1px dashed var(--ember);
             border-radius:12px; padding:14px 18px; margin-bottom:18px; }
  .code-box .lbl{ font-size:0.7rem; color:var(--stone-400); letter-spacing:0.15em; text-transform:uppercase; }
  .code-box .code{ font-family:ui-monospace,monospace; font-size:1.8rem; letter-spacing:0.3em; color:var(--ember); font-weight:700; }
  .invite{ margin:-6px 0 18px; }
  .invite .lbl{ font-size:0.68rem; color:var(--stone-400); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:6px; }
  .invite-row{ display:flex; gap:8px; }
  .invite-row input{ flex:1; font-size:0.8rem; color:var(--stone-300); }
  .member{ display:flex; justify-content:space-between; align-items:center; gap:8px;
           background:var(--basalt-900); border:1px solid var(--basalt-600); border-radius:10px; padding:9px 12px; margin-bottom:7px; }
  .member.me{ border-color:var(--ember); }
  .mname{ font-weight:600; } .mname small{ color:var(--stone-400); font-weight:400; }
  .mtags{ display:flex; align-items:center; gap:6px; }
  .tag{ font-size:0.62rem; letter-spacing:0.06em; text-transform:uppercase; padding:3px 8px; border-radius:20px;
        background:var(--basalt-700); color:var(--stone-300); border:1px solid var(--basalt-600); }
  .tag.admin{ color:var(--gold); border-color:var(--gold); } .tag.ready{ color:var(--myco); border-color:var(--myco); }
  .tag.wait{ color:var(--stone-400); } .tag.dm{ color:var(--azure); border-color:var(--azure); }
  .mini-x{ background:none; border:1px solid var(--blood); color:var(--blood); border-radius:6px; cursor:pointer; padding:1px 7px; }
  .ready-btn{ width:100%; margin-top:6px; }
  .ready-btn.on{ background:var(--basalt-700); color:var(--myco); border:1px solid var(--myco); }
  h4{ font-family:ui-monospace,monospace; font-size:0.64rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--ember); margin:18px 0 10px; }
  .note{ color:var(--stone-400); font-size:0.78rem; margin-top:6px; }
  .chk{ display:flex; align-items:center; gap:8px; } .chk input{ width:auto; }
  .toast{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--basalt-600);
          border:1px solid var(--ember); color:var(--parch); padding:10px 18px; border-radius:10px; font-size:0.86rem; z-index:99; }
</style>
</head>
<body>
<div class="wrap">

  <!-- LOGIN -->
  <section id="screen-login" class="screen active">
    <div class="eyebrow">Tormenta de Stormwreck · Multiplayer</div>
    <h1>Entrar na mesa</h1>
    <p class="sub">Use a mesma conta da versão single-player.</p>
    <div class="panel">
      <label class="field"><span>E-mail</span><input id="loginEmail" type="email" autocomplete="email" placeholder="voce@email.com"></label>
      <label class="field"><span>Senha</span><input id="loginPass" type="password" autocomplete="current-password" placeholder="••••••••"></label>
      <button class="btn block" id="loginBtn">Entrar</button>
      <div class="err" id="loginErr"></div>
    </div>
  </section>

  <!-- HUB -->
  <section id="screen-hub" class="screen">
    <div class="topline">
      <div><div class="eyebrow">Multiplayer</div><h1>Salas</h1></div>
      <div style="text-align:right"><small id="hubEmail"></small><br><button class="btn ghost" id="hubLogout" style="margin-top:6px;padding:6px 12px;font-size:0.78rem">Sair</button></div>
    </div>

    <div class="panel">
      <h4>Criar uma sala</h4>
      <label class="field"><span>Nome da mesa</span><input id="roomName" type="text"></label>
      <div class="row">
        <label class="field" style="flex:1"><span>Seu papel</span>
          <select id="adminRole">
            <option value="play">Jogo e controlo (jogador-admin)</option>
            <option value="dm">Sou só o Mestre (sem personagem)</option>
          </select>
        </label>
        <label class="field" style="flex:1"><span>Modelo da IA</span>
          <select id="roomModel">
            <option value="claude-haiku-4-5">Haiku — barato e rápido</option>
            <option value="claude-sonnet-4-6">Sonnet — narração mais rica</option>
          </select>
        </label>
      </div>
      <button class="btn block" id="createBtn">Criar sala</button>
    </div>

    <div class="or">— OU —</div>

    <div class="panel">
      <h4>Entrar com código</h4>
      <label class="field"><span>Código da sala</span><input id="joinCode" type="text" maxlength="6" placeholder="EX: K7P2QX" style="text-transform:uppercase;letter-spacing:0.2em;font-family:ui-monospace,monospace"></label>
      <button class="btn block ghost" id="joinBtn">Entrar na sala</button>
    </div>
  </section>

  <!-- SALA (lobby) -->
  <section id="screen-room" class="screen">
    <div class="topline">
      <div><div class="eyebrow">Sala de espera</div><h1 id="roomTitle">Sala</h1></div>
      <button class="btn ghost" id="leaveBtn" style="padding:7px 14px;font-size:0.8rem">Sair da sala</button>
    </div>

    <div class="code-box">
      <div><div class="lbl">Código</div><div class="code" id="roomCode">—</div></div>
      <button class="btn ghost" id="copyCodeBtn" style="margin-left:auto;padding:8px 12px;font-size:0.8rem">Copiar código</button>
    </div>

    <div class="invite" id="inviteBox" style="display:none">
      <div class="lbl">Link de convite — só quem tem o link entra</div>
      <div class="invite-row">
        <input id="inviteLink" type="text" readonly>
        <button class="btn" id="copyLinkBtn" style="padding:9px 14px;font-size:0.82rem">Copiar link</button>
      </div>
    </div>

    <div class="panel">
      <div class="row between" style="margin-bottom:12px">
        <h4 style="margin:0">Na mesa</h4><small class="note" id="roomCount" style="margin:0"></small>
      </div>
      <div id="memberList"></div>

      <div id="readyWrap">
        <button class="btn ready-btn" id="readyBtn">Marcar como pronto</button>
        <p class="note" id="readyNote"></p>
      </div>
    </div>

    <div class="panel" id="adminPanel" style="display:none">
      <h4>Controles do Mestre (admin)</h4>
      <div class="row">
        <label class="field" style="flex:1"><span>Modelo da IA</span>
          <select id="admModel">
            <option value="claude-haiku-4-5">Haiku — barato e rápido</option>
            <option value="claude-sonnet-4-6">Sonnet — narração mais rica</option>
          </select>
        </label>
      </div>
      <label class="chk" style="margin-bottom:14px"><input type="checkbox" id="admGm"> <span>Modo Mestre (edição manual de fichas)</span></label>
      <button class="btn block" id="startBtn" disabled>Iniciar a partida</button>
      <p class="note" id="startNote"></p>
    </div>
  </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="mp.js"></script>
</body>
</html>
